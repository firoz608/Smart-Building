    SMART BUILDING

        </a>
      </li>

      <li class="list-item">
        <a routerLink="/device-health" (click)="toggleMenu = !toggleMenu">
          <span class="material-icons-outlined">monitor_heart</span> Device Health
        </a>

  </div>
